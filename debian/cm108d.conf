# /etc/security/limits.d/cm108d.conf
# Real-time resource limits for the cm108d daemon user.
#
# Install with: cp debian/cm108d.conf /etc/security/limits.d/cm108d.conf
# Reload by logging out and back in, or by restarting the PAM session.

# Allow real-time scheduling (SCHED_FIFO) up to priority 95.
cm108    -    rtprio     95

# Allow mlockall(MCL_CURRENT | MCL_FUTURE) for zero-latency memory.
cm108    -    memlock    unlimited

# Optional: raise the scheduling priority of non-RT work.
cm108    -    nice       -20
