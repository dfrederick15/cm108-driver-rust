[build]
# Remap build paths out of debug info — required for reproducible builds.
# SOURCE_DATE_EPOCH and RUSTFLAGS are further set in debian/rules.
rustflags = [
    "--remap-path-prefix", "/home=<home>",
    "--remap-path-prefix", "/root=<root>",
    "--remap-path-prefix", "/build=<build>",
]

[target.aarch64-unknown-linux-gnu]
linker = "aarch64-linux-gnu-gcc"

[target.x86_64-unknown-linux-gnu]
# Use lld for faster linking in release builds.
# linker = "clang"
# rustflags = ["-C", "link-arg=-fuse-ld=lld"]
